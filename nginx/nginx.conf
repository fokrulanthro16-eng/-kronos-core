worker_processes auto;
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;

    # ── Rate-limit zones ─────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_global:10m  rate=60r/m;
    limit_req_zone $binary_remote_addr zone=api_audit:10m   rate=30r/m;
    limit_req_zone $binary_remote_addr zone=api_sandbox:10m rate=5r/m;

    # ── Structured access log ────────────────────────────────────────────
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"ip":"$remote_addr",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"status":$status,'
        '"duration":$request_time,'
        '"bytes_sent":$bytes_sent,'
        '"request_id":"$http_x_request_id"}';
    access_log /dev/stdout json_combined;

    upstream kronos_backend {
        server kronos-core:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 2m;
        keepalive_timeout 65;

        # ── Health — no rate limit ────────────────────────────────────────
        location ~ ^/health {
            proxy_pass         http://kronos_backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_http_version 1.1;
        }

        # ── Sandbox — tightest limit ──────────────────────────────────────
        location /api/v1/sandbox/ {
            limit_req  zone=api_sandbox burst=3 nodelay;
            proxy_pass http://kronos_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── Audit endpoints ───────────────────────────────────────────────
        location /api/v1/audit/ {
            limit_req  zone=api_audit burst=10 nodelay;
            proxy_pass http://kronos_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── All other /api/ routes ────────────────────────────────────────
        location /api/ {
            limit_req  zone=api_global burst=20 nodelay;
            proxy_pass http://kronos_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── Block everything else ─────────────────────────────────────────
        location / {
            return 404;
        }
    }
}
