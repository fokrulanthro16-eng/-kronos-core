version: "3.9"

services:
  kronos-core:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: kronos-core:1.0.0
    container_name: kronos-core
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=KRONOS CORE
      - APP_VERSION=1.0.0
      - APP_ENV=production
      - SECRET_KEY=${SECRET_KEY:-kronos-core-change-me-in-production}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - RATE_LIMIT_PER_MINUTE=60
      - LOG_LEVEL=INFO
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: "10001:10001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
